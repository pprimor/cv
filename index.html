<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pedro Primor — CV</title>
  <link rel="icon" type="image/x-icon" href="Icons8-Windows-8-Very-Basic-Document.ico">
  <style>
    html, body { width: 100%; height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; }
    .lang-bar {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem;
      font-family: system-ui, sans-serif;
      font-size: 0.875rem;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }
    .lang-bar button {
      font: inherit;
      padding: 0.25rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .lang-bar button[aria-pressed="true"] {
      font-weight: 600;
      border-color: #333;
      background: #eee;
    }
    .lang-bar button:focus-visible {
      outline: 2px solid #333;
      outline-offset: 2px;
    }
    iframe { flex: 1 1 auto; width: 100%; border: 0; display: block; min-height: 0; }
    .fallback {
      display: none;
      padding: 2rem;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav class="lang-bar" aria-label="Language">
    <button type="button" id="lang-en" aria-pressed="true">EN</button>
    <button type="button" id="lang-pt" aria-pressed="false">PT</button>
  </nav>
  <iframe id="cv-frame" src="CV.pdf" title="Pedro Primor — CV"></iframe>
  <noscript>
    <p class="fallback" style="display: block;">
      <a href="CV.pdf">CV (English)</a>
      &nbsp;|&nbsp;
      <a href="CV_pt.pdf">Currículo (Português)</a>
    </p>
  </noscript>
  <script>
    (function () {
      var STORAGE_KEY = 'cv-lang';
      var LANG = {
        en: { pdf: 'CV.pdf', htmlLang: 'en', title: 'Pedro Primor — CV', frameTitle: 'Pedro Primor — CV' },
        pt: { pdf: 'CV_pt.pdf', htmlLang: 'pt', title: 'Pedro Primor — Currículo', frameTitle: 'Pedro Primor — Currículo' }
      };
      var btnEn = document.getElementById('lang-en');
      var btnPt = document.getElementById('lang-pt');
      var frame = document.getElementById('cv-frame');

      function setLang(code) {
        var cfg = LANG[code];
        if (!cfg) return;
        document.documentElement.lang = cfg.htmlLang;
        document.title = cfg.title;
        frame.src = cfg.pdf;
        frame.title = cfg.frameTitle;
        btnEn.setAttribute('aria-pressed', code === 'en' ? 'true' : 'false');
        btnPt.setAttribute('aria-pressed', code === 'pt' ? 'true' : 'false');
        try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {}
      }

      btnEn.addEventListener('click', function () { setLang('en'); });
      btnPt.addEventListener('click', function () { setLang('pt'); });

      var saved;
      try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) {}
      if (saved === 'pt') setLang('pt');
    })();
  </script>
</body>
</html>
