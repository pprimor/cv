name: Build CV

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-cv-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - uses: TeX-Live/setup-texlive-action@v3
        with:
          version: 2025
          packages: >-
            scheme-basic
            latexmk
            preprint
            tools
            hyperref
            pdftex
            babel-english
            babel-portuguese
            xcolor
            enumitem
            titlesec
            fancyhdr
            marvosym
            ragged2e
            footmisc
            fontawesome
            collection-fontsrecommended

      - name: Build PDFs
        # checkout resets mtimes; touch sources so make always runs latexmk
        run: touch cv_en.tex cv_pt.tex && make cv

      - name: Verify single-page PDFs
        run: |
          test "$(pdfinfo CV.pdf | awk '/^Pages:/ {print $2}')" -eq 1
          test "$(pdfinfo CV_pt.pdf | awk '/^Pages:/ {print $2}')" -eq 1

      - name: Verify committed PDFs match build
        if: github.event_name == 'pull_request'
        run: git diff --exit-code CV.pdf CV_pt.pdf

      - name: Commit updated PDFs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: rebuild CV.pdf and CV_pt.pdf [skip ci]"
          file_pattern: CV.pdf CV_pt.pdf
